name: SSH Debug VM

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # keeps session alive (~6 hours)

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Update system
        run: sudo apt-get update

      - name: Start SSH session (tmate)
        uses: mxschmitt/action-tmate@v3

      - name: Keep runner alive
        run: sleep 6h
